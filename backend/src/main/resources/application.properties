# SmartAlarm 后端配置

# ==================== 服务器配置 ====================
server.port=8080
server.servlet.context-path=/api

# ==================== 数据库配置 ====================
# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smartalarm
spring.datasource.username=smartalarm
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver

# MySQL (可选)
# spring.datasource.url=jdbc:mysql://localhost:3306/smartalarm?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==================== JWT 配置 ====================
jwt.secret=your-secret-key-must-be-at-least-32-characters-long
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ==================== 微信小程序配置 ====================
wechat.appid=YOUR_WECHAT_APPID
wechat.secret=YOUR_WECHAT_SECRET
wechat.token=YOUR_WECHAT_TOKEN
wechat.encodingAesKey=YOUR_ENCODING_AES_KEY

# 订阅消息模板 ID
wechat.template.alarm-reminder=YOUR_TEMPLATE_ID

# ==================== Redis 配置 ====================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=5000ms

# ==================== 日志配置 ====================
logging.level.root=INFO
logging.level.com.smartalarm=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/smart-alarm.log

# ==================== Swagger 配置 ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==================== 跨域配置 ====================
cors.allowed-origins=http://localhost:3000,https://yourdomain.com
